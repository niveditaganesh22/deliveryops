name: apply-stage

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag (optional for now)"
        required: false
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest

    # This is your approval gate (because you configured env "stage" with reviewers)
    environment: stage

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra/envs/stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_STAGE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init (remote backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="key=deliveryops/stage/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve